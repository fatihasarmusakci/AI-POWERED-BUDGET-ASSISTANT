services:
  - type: web
    name: velo-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: CELERY_EAGER
        value: "true"
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./vibecheck.db
      - key: SYNC_DATABASE_URL
        value: sqlite:///./vibecheck.db
      - key: CORS_ORIGINS
        value: "*"
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
